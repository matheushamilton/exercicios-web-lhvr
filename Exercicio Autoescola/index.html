<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoEscola</title>
    <link rel="shortcut icon" href="imagens_autoescola/favicon_autoescola_logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
</head>
<body>
    
    <section class="section_principal">
        <div class="div_autoescola">
            <h1>AUTOESCOLA - INSCRIÇÃO</h1>

            <form action="" id="id_formularioAutoescola" name="formulario">

                <fieldset>
                    <legend>SISTEMA AUTOESCOLA</legend>
                    Informe sua idade para verificarmos sua elegibilidade. <br><br>
                    <label for="id_idade"> Idade:
                        <input type="text"
                        id="id_idade"
                        name="idade"
                        required
                        autofocus
                        placeholder="Informe a sua idade"
                        >
                    </label> 

                    <button type="submit" id="id_verificar">Verificar</button>
                    
                    <p id="id_resultado"></p>
                </fieldset>
            </form>
        </div>
    </section>

    
    <script src="script.js"></script>
</body>
</html>
