<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini Jogo Interativo</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #111;
        color: white;
    }

    #bloco {
        margin: 20px auto;
        width: 120px;
        height: 120px;
        display: flex;
        justify-content: center;
        align-items: center;
        background: darkblue;
        cursor: pointer;
        border-radius: 10px;
        transition: 0.3s;
    }

    input {
        padding: 8px;
        margin: 10px;
        border-radius: 5px;
        border: none;
    }

    #mensagem {
        margin-top: 10px;
        font-size: 14px;
        color: lightgreen;
    }
</style>
</head>

<body>

<h2>Mini Jogo de Eventos</h2>

<div id="bloco">Bloco</div>

<input id="campo1" placeholder="Clique aqui">
<input id="campo2" placeholder="Digite algo">

<p id="mensagem">Interaja com a tela</p>

<script src="script.js"></script>

</body>
</html>
    
</body>
</html>
